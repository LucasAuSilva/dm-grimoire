version: "3.9"
services:
  backend:
    build: ./backend
    container_name: dm-grimoire-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: dm-grimoire-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
